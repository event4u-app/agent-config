name: Tests

on:
  pull_request:
    branches: [main, master]
    paths:
      - "scripts/**"
      - "tests/**"
      - "Taskfile.yml"
      - "install.sh"
      - ".github/workflows/tests.yml"
  push:
    branches: [main, master]
    paths:
      - "scripts/**"
      - "tests/**"
      - "Taskfile.yml"
      - "install.sh"
      - ".github/workflows/tests.yml"

jobs:
  install-tests:
    name: Install Script Tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Run install.sh integration tests
        run: bash tests/test_install.sh

  python-tests:
    name: Python Tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install test deps
        run: pip install pytest

      - name: Run Python tests
        # pytest discovers every test module in tests/. Prevents new test
        # files from silently missing CI coverage.
        run: python3 -m pytest tests/ -v
