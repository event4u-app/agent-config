name: Tests

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  install-tests:
    name: Install Script Tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Run install.sh integration tests
        run: bash tests/test_install.sh

  python-tests:
    name: Python Tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Run Python tests
        run: python3 -m unittest tests.test_compress -v

      - name: Check sync
        run: python3 scripts/compress.py --check
