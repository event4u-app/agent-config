name: Tests

on:
  pull_request:
    branches: [main, master]
    paths:
      - "scripts/**"
      - "tests/**"
      - "Taskfile.yml"
      - "install.sh"
      - ".agent-src.uncompressed/skills/lint-skills/**"
      - ".agent-src.uncompressed/skills/check-refs/**"
      - ".github/workflows/tests.yml"
  push:
    branches: [main, master]
    paths:
      - "scripts/**"
      - "tests/**"
      - "Taskfile.yml"
      - "install.sh"
      - ".agent-src.uncompressed/skills/lint-skills/**"
      - ".agent-src.uncompressed/skills/check-refs/**"
      - ".github/workflows/tests.yml"

jobs:
  install-tests:
    name: Install Script Tests (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]

    steps:
      - uses: actions/checkout@v4

      - name: Run install.sh integration tests
        run: bash tests/test_install.sh

      - name: Run install orchestrator integration tests
        run: bash tests/test_install_orchestrator.sh

  python-tests:
    name: Python Tests (${{ matrix.os }}, ${{ matrix.python-version }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest]
        python-version: ['3.10', '3.11', '3.12', '3.13']
        include:
          # Minimum supported version is Python 3.10 (per AGENTS.md).
          # macOS runs only the newest supported version to keep CI cost low.
          - os: macos-latest
            python-version: '3.12'

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install test deps
        # pytest drives the suite; pyyaml is a runtime dep of the memory
        # tooling (check_memory / check_proposal / memory_lookup) that
        # the tests invoke via subprocess.
        run: pip install pytest pyyaml

      - name: Run Python tests
        # pytest discovers every test module in tests/. Prevents new test
        # files from silently missing CI coverage.
        run: python3 -m pytest tests/ -v

      - name: Runtime E2E (dispatch pilot skills via CLI)
        # Guards the public dispatcher CLI contract for runnable skills.
        # Pytest exercises the handler in-process; this step proves
        # `python3 scripts/runtime_dispatcher.py run --skill <name>`
        # still exits 0 for the two pilots. Kept narrow on purpose — add
        # a pilot to the matrix below only after it has unit coverage.
        # Each run persists its ExecutionResult so the next step can
        # render a job summary even if an individual skill fails.
        run: |
          mkdir -p agents/reports/runs
          python3 scripts/runtime_dispatcher.py run --skill lint-skills \
            --output agents/reports/runs/lint-skills.json
          python3 scripts/runtime_dispatcher.py run --skill check-refs \
            --output agents/reports/runs/check-refs.json

      - name: CI summary (dispatcher runs)
        # Renders a Markdown table of the runs above as a GitHub Step
        # Summary. Runs on success AND failure so failing pilots still
        # show up in the PR UI with their stderr tail.
        if: always()
        run: python3 scripts/ci_summary.py --runs agents/reports/runs
