name: Sync Check

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  sync-check:
    name: Verify .augment/ is in sync
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Check sync
        run: python3 scripts/compress.py --check

      - name: Run tests
        run: python3 -m unittest tests.test_compress -v
