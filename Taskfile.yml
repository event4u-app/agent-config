version: '3'

tasks:
  sync:
    desc: Sync .agent-src.uncompressed/ → .agent-src/, then project → .augment/, then refresh doc counts
    cmds:
      - bash scripts/compress.sh --sync
      - python3 scripts/update_counts.py

  project-augment:
    desc: Rebuild the .augment/ projection from .agent-src/ (copies rules, symlinks rest)
    cmd: python3 scripts/compress.py --project-augment

  sync-list:
    desc: List ALL .md files (regardless of change status)
    cmd: bash scripts/compress.sh --list

  sync-changed:
    desc: List .md files changed since last compression (hash-based)
    cmd: bash scripts/compress.sh --changed

  sync-check:
    desc: Check if .agent-src/ is in sync with .agent-src.uncompressed/ (for CI)
    cmd: bash scripts/compress.sh --check

  sync-check-hashes:
    desc: Check if all compressed .md files match their source hashes (for CI)
    cmd: bash scripts/compress.sh --check-hashes

  sync-clean-hashes:
    desc: Remove stale hashes for deleted source files
    cmd: bash scripts/compress.sh --clean-hashes

  sync-mark-done:
    desc: Mark a single file as compressed (updates hash)
    cmd: bash scripts/compress.sh --mark-done {{.CLI_ARGS}}

  sync-mark-all-done:
    desc: Mark ALL .md files as compressed (run after initial full compression)
    cmd: bash scripts/compress.sh --mark-all-done

  generate-tools:
    desc: Generate tool-specific directories (.claude/, .cursor/, .clinerules/, .windsurfrules, GEMINI.md)
    cmd: python3 scripts/compress.py --generate-tools

  clean-tools:
    desc: Remove all generated tool directories and files
    cmd: python3 scripts/compress.py --clean-tools

  install:
    desc: Run the installer orchestrator (sync + bridges)
    cmd: bash scripts/install {{.CLI_ARGS}}

  install-hooks:
    desc: Install git hooks (pre-push sync check)
    cmd: bash scripts/install-hooks.sh


  test:
    desc: Run all tests (bash + Python)
    cmds:
      - bash tests/test_install.sh
      - bash tests/test_install_orchestrator.sh
      - python3 -m pytest tests/ -v

  test-install:
    desc: Run install.sh + orchestrator + install.py tests
    cmds:
      - bash tests/test_install.sh
      - bash tests/test_install_orchestrator.sh
      - python3 -m pytest tests/test_install_py.py -v

  test-python:
    desc: Run all Python unit tests (pytest-discovered)
    cmd: python3 -m pytest tests/ -v

  generate-catalog:
    desc: Regenerate llms.txt and docs/skills-catalog.md from SKILL.md frontmatter
    cmd: python3 scripts/generate_catalog.py

  counts-update:
    desc: Sync skill/rule/command/guideline counts in README.md, AGENTS.md, docs/getting-started.md
    cmd: python3 scripts/update_counts.py

  counts-check:
    desc: Verify doc counts match reality (fails if stale)
    cmd: python3 scripts/update_counts.py --check


  lint-skills:
    desc: Lint all skills and rules
    cmd: python3 scripts/skill_linter.py --all

  lint-skills-strict:
    desc: Lint all skills and rules, warnings fail too
    cmd: python3 scripts/skill_linter.py --all --strict-warnings

  lint-skills-changed:
    desc: Lint changed skills and rules
    cmd: python3 scripts/skill_linter.py --changed

  lint-skills-json:
    desc: Lint all skills and rules with JSON output
    cmd: python3 scripts/skill_linter.py --all --format json

  lint-skills-report:
    desc: Generate quality report for all skills and rules
    cmd: python3 scripts/skill_linter.py --all --report

  lint-skills-pairs:
    desc: Check compression quality between uncompressed and compressed pairs
    cmd: python3 scripts/skill_linter.py --all --pairs --compression-quality

  lint-skills-regression:
    desc: Compare lint results between current branch and main (detect regressions)
    cmd: python3 scripts/lint_regression.py --baseline main

  audit-descriptions:
    desc: Audit skill descriptions for pushy-description pattern compliance (worst 15)
    cmd: python3 scripts/audit_skill_descriptions.py

  audit-descriptions-full:
    desc: Audit skill descriptions (full list of all flagged)
    cmd: python3 scripts/audit_skill_descriptions.py --full

  test-triggers:
    desc: "Run trigger eval for one skill (MockRouter, no API call). Usage: task test-triggers -- eloquent"
    cmd: python3 scripts/skill_trigger_eval.py --skill {{.CLI_ARGS}} --dry-run

  setup-evals:
    desc: "Bootstrap .venv/ with the pinned anthropic SDK for live trigger evals (idempotent)."
    cmd: bash scripts/setup_eval_venv.sh
    interactive: true

  install-anthropic-key:
    desc: |
      Install the Anthropic API key used by live trigger evals.
      Interactive: key is read with no echo and stored in
      ~/.config/agent-config/anthropic.key (mode 0600). Piped stdin is
      refused. Rerun to rotate.
    cmd: bash scripts/install_anthropic_key.sh
    interactive: true

  test-triggers-live:
    desc: |
      Run trigger eval against Claude API. The runner enforces:
        1) key file ~/.config/agent-config/anthropic.key (mode 0600)
        2) interactive tty stdin
        3) explicit 'yes' at the pre-run cost preview
      Bootstrap once:        task setup-evals
      Install the key once:  task install-anthropic-key
      Usage: task test-triggers-live -- eloquent
    cmd: .venv/bin/python3 scripts/skill_trigger_eval.py --skill {{.CLI_ARGS}}
    preconditions:
      - sh: test -x .venv/bin/python3
        msg: ".venv missing — run 'task setup-evals' first"
    interactive: true

  lint-readme:
    desc: Lint README.md for quality, correctness, and completeness
    cmd: python3 scripts/readme_linter.py README.md --root .

  lint-readme-strict:
    desc: Lint README.md with warnings as errors
    cmd: python3 scripts/readme_linter.py README.md --root . --strict

  lint-marketplace:
    desc: Lint .claude-plugin/marketplace.json against the Claude Code Plugin schema
    cmd: python3 scripts/lint_marketplace.py

  test-linter:
    desc: Run skill linter tests
    cmd: python3 -m pytest tests/test_skill_linter.py -v

  test-readme-linter:
    desc: Run README linter tests
    cmd: python3 -m pytest tests/test_readme_linter.py -v

  test-marketplace-linter:
    desc: Run marketplace linter tests
    cmd: python3 -m pytest tests/test_lint_marketplace.py -v

  test-runtime:
    desc: Run runtime registry and dispatcher tests
    cmd: python3 -m pytest tests/test_runtime_registry.py tests/test_runtime_dispatcher.py -v

  runtime-list:
    desc: List all runtime-capable skills
    cmd: python3 scripts/runtime_registry.py

  runtime-list-json:
    desc: List all runtime-capable skills (JSON output)
    cmd: python3 scripts/runtime_registry.py --format json

  runtime-validate:
    desc: Validate runtime registry consistency
    cmd: python3 scripts/runtime_registry.py --validate

  tool-list:
    desc: List all registered tools
    cmd: python3 scripts/tool_registry.py

  tool-validate:
    desc: Validate tool declarations
    cmd: python3 scripts/tool_registry.py --validate-tools {{.CLI_ARGS}}

  test-tools:
    desc: Run tool registry and adapter tests
    cmd: python3 -m pytest tests/test_tool_registry.py tests/test_tool_adapters.py -v

  test-runtime-all:
    desc: Run all runtime and tools tests
    cmd: python3 -m pytest tests/test_runtime_registry.py tests/test_runtime_dispatcher.py tests/test_runtime_handler.py tests/test_tool_registry.py tests/test_tool_adapters.py tests/test_ci_summary.py -v

  runtime-e2e:
    desc: End-to-end gate — dispatch each runnable pilot skill and fail on any non-zero exit
    cmds:
      - python3 scripts/runtime_dispatcher.py run --skill lint-skills
      - python3 scripts/runtime_dispatcher.py run --skill check-refs

  consistency:
    desc: Verify sync + generated tool outputs are clean
    cmds:
      - task: sync-check
      - task: sync-check-hashes
      - task: sync
      - task: generate-tools
      - git diff --quiet

  consistency-fix:
    desc: Regenerate all derived outputs from source-of-truth
    cmds:
      - task: sync
      - task: generate-tools

  check-refs:
    desc: Check for broken cross-references in .md files
    cmd: python3 scripts/check_references.py

  check-refs-json:
    desc: Check for broken cross-references (JSON output)
    cmd: python3 scripts/check_references.py --format json

  check-portability:
    desc: Check package portability (no project-specific references)
    cmd: python3 scripts/check_portability.py

  check-compression:
    desc: Check compression quality (headings, code blocks, frontmatter, word count)
    cmd: python3 scripts/check_compression.py

  validate-schema:
    desc: Validate artefact frontmatter against JSON-Schema (scripts/schemas/)
    cmd: python3 scripts/validate_frontmatter.py

  roadmap-progress:
    desc: Regenerate agents/roadmaps-progress.md from all open roadmaps
    cmd: python3 .augment/scripts/update_roadmap_progress.py

  roadmap-progress-check:
    desc: Fail if agents/roadmaps-progress.md is stale (for CI)
    cmd: python3 .augment/scripts/update_roadmap_progress.py --check

  quality-report:
    desc: Generate quality score report (per artifact type)
    cmd: python3 scripts/skill_linter.py --report

  first-run:
    desc: Show the recommended first-run experience for new users
    cmd: bash scripts/first-run.sh

  release:bump:
    desc: |
      Bump package.json + marketplace.json to {{.CLI_ARGS}} and create a
      release commit. Usage: task release:bump -- 1.9.0
      After the commit lands on main, create the matching git tag and push
      it; the Release Guard workflow asserts package.json and tag agree.
    cmd: |
      version="{{.CLI_ARGS}}"
      if [ -z "$version" ]; then
        echo "error: version argument required (e.g. task release:bump -- 1.9.0)" >&2
        exit 2
      fi
      npm version "$version" --no-git-tag-version --allow-same-version
      # Keep .claude-plugin/marketplace.json in sync — lint_marketplace.py
      # asserts metadata.version == package.json.version.
      python3 -c "
      import json, sys
      from pathlib import Path
      mp = Path('.claude-plugin/marketplace.json')
      data = json.loads(mp.read_text())
      data.setdefault('metadata', {})['version'] = '$version'
      mp.write_text(json.dumps(data, indent=2) + '\n')
      "
      git add package.json .claude-plugin/marketplace.json
      git commit -m "release: $version"
      echo
      echo "Next steps:"
      echo "  git push"
      echo "  git tag $version"
      echo "  git push origin $version"

  mcp:render:
    desc: "Render mcp.json → .cursor/mcp.json, .windsurf/mcp.json (add --claude-desktop for user-scope)"
    cmd: python3 scripts/mcp_render.py {{.CLI_ARGS}}

  mcp:check:
    desc: "Check MCP targets are in sync with mcp.json (non-zero exit if stale)"
    cmd: python3 scripts/mcp_render.py --check {{.CLI_ARGS}}

  memory:status:
    desc: "Engineering-memory observability — backend status, intake counts, curated staleness"
    cmd: python3 scripts/memory_report.py {{.CLI_ARGS}}

  check-memory:
    desc: "Validate agents/memory/ schema, statuses, and staleness (short-circuits if empty)"
    cmd: |
      if [ -d "agents/memory" ] && [ "$(find agents/memory -name '*.yml' 2>/dev/null | wc -l)" -gt 0 ]; then
        python3 scripts/check_memory.py --path agents/memory
      else
        echo "  ℹ️  no agents/memory/*.yml files — skipping"
      fi

  memory:shadow-report:
    desc: "Per-type shadow counts from the repo-vs-operational conflict rule (weekly cron target)"
    cmd: python3 scripts/check_memory.py --shadow-report {{.CLI_ARGS}}

  ci:
    desc: Run ALL CI checks locally (must pass before push)
    cmds:
      - task: consistency
      - task: counts-check
      - task: check-compression
      - task: check-refs
      - task: check-portability
      - task: validate-schema
      - task: lint-skills
      - task: lint-marketplace
      - task: check-memory
      - task: test
      - task: runtime-e2e
      - task: lint-readme