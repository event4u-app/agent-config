version: '3'

tasks:
  sync:
    desc: Sync .agent-src.uncompressed/ → .agent-src/, then project → .augment/
    cmd: bash scripts/compress.sh --sync

  project-augment:
    desc: Rebuild the .augment/ projection from .agent-src/ (copies rules, symlinks rest)
    cmd: python3 scripts/compress.py --project-augment

  sync-list:
    desc: List ALL .md files (regardless of change status)
    cmd: bash scripts/compress.sh --list

  sync-changed:
    desc: List .md files changed since last compression (hash-based)
    cmd: bash scripts/compress.sh --changed

  sync-check:
    desc: Check if .agent-src/ is in sync with .agent-src.uncompressed/ (for CI)
    cmd: bash scripts/compress.sh --check

  sync-check-hashes:
    desc: Check if all compressed .md files match their source hashes (for CI)
    cmd: bash scripts/compress.sh --check-hashes

  sync-clean-hashes:
    desc: Remove stale hashes for deleted source files
    cmd: bash scripts/compress.sh --clean-hashes

  sync-mark-done:
    desc: Mark a single file as compressed (updates hash)
    cmd: bash scripts/compress.sh --mark-done {{.CLI_ARGS}}

  sync-mark-all-done:
    desc: Mark ALL .md files as compressed (run after initial full compression)
    cmd: bash scripts/compress.sh --mark-all-done

  generate-tools:
    desc: Generate tool-specific directories (.claude/, .cursor/, .clinerules/, .windsurfrules, GEMINI.md)
    cmd: python3 scripts/compress.py --generate-tools

  clean-tools:
    desc: Remove all generated tool directories and files
    cmd: python3 scripts/compress.py --clean-tools

  install:
    desc: Run install.sh to sync agent-config to a target project
    cmd: bash scripts/install.sh {{.CLI_ARGS}}

  install-hooks:
    desc: Install git hooks (pre-push sync check)
    cmd: bash scripts/install-hooks.sh


  test:
    desc: Run all tests (bash + Python)
    cmds:
      - bash tests/test_install.sh
      - python3 -m pytest tests/ -v

  test-install:
    desc: Run install.sh + install.py tests
    cmds:
      - bash tests/test_install.sh
      - python3 -m pytest tests/test_install_py.py -v

  test-python:
    desc: Run all Python unit tests (pytest-discovered)
    cmd: python3 -m pytest tests/ -v

  generate-catalog:
    desc: Regenerate llms.txt and docs/skills-catalog.md from SKILL.md frontmatter
    cmd: python3 scripts/generate_catalog.py


  lint-skills:
    desc: Lint all skills and rules
    cmd: python3 scripts/skill_linter.py --all

  lint-skills-strict:
    desc: Lint all skills and rules, warnings fail too
    cmd: python3 scripts/skill_linter.py --all --strict-warnings

  lint-skills-changed:
    desc: Lint changed skills and rules
    cmd: python3 scripts/skill_linter.py --changed

  lint-skills-json:
    desc: Lint all skills and rules with JSON output
    cmd: python3 scripts/skill_linter.py --all --format json

  lint-skills-report:
    desc: Generate quality report for all skills and rules
    cmd: python3 scripts/skill_linter.py --all --report

  lint-skills-pairs:
    desc: Check compression quality between uncompressed and compressed pairs
    cmd: python3 scripts/skill_linter.py --all --pairs --compression-quality

  lint-skills-regression:
    desc: Compare lint results between current branch and main (detect regressions)
    cmd: python3 scripts/lint_regression.py --baseline main

  lint-readme:
    desc: Lint README.md for quality, correctness, and completeness
    cmd: python3 scripts/readme_linter.py README.md --root .

  lint-readme-strict:
    desc: Lint README.md with warnings as errors
    cmd: python3 scripts/readme_linter.py README.md --root . --strict

  lint-marketplace:
    desc: Lint .claude-plugin/marketplace.json against the Claude Code Plugin schema
    cmd: python3 scripts/lint_marketplace.py

  test-linter:
    desc: Run skill linter tests
    cmd: python3 -m pytest tests/test_skill_linter.py -v

  test-readme-linter:
    desc: Run README linter tests
    cmd: python3 -m pytest tests/test_readme_linter.py -v

  test-marketplace-linter:
    desc: Run marketplace linter tests
    cmd: python3 -m pytest tests/test_lint_marketplace.py -v

  test-runtime:
    desc: Run runtime registry and dispatcher tests
    cmd: python3 -m pytest tests/test_runtime_registry.py tests/test_runtime_dispatcher.py -v

  runtime-list:
    desc: List all runtime-capable skills
    cmd: python3 scripts/runtime_registry.py

  runtime-list-json:
    desc: List all runtime-capable skills (JSON output)
    cmd: python3 scripts/runtime_registry.py --format json

  runtime-validate:
    desc: Validate runtime registry consistency
    cmd: python3 scripts/runtime_registry.py --validate

  tool-list:
    desc: List all registered tools
    cmd: python3 scripts/tool_registry.py

  tool-validate:
    desc: Validate tool declarations
    cmd: python3 scripts/tool_registry.py --validate-tools {{.CLI_ARGS}}

  test-tools:
    desc: Run tool registry and adapter tests
    cmd: python3 -m pytest tests/test_tool_registry.py tests/test_tool_adapters.py -v

  test-runtime-all:
    desc: Run all runtime, tools, observability, feedback, and lifecycle tests
    cmd: python3 -m pytest tests/test_runtime_registry.py tests/test_runtime_dispatcher.py tests/test_runtime_execute.py tests/test_runtime_errors.py tests/test_runtime_hooks.py tests/test_observability.py tests/test_feedback_collector.py tests/test_skill_lifecycle.py tests/test_tool_registry.py tests/test_tool_adapters.py tests/test_runtime_pipeline.py tests/test_persistence.py tests/test_report_generator.py -v

  runtime-execute:
    desc: Run a skill through the full pipeline
    cmd: python3 scripts/runtime_pipeline.py --skill {{.CLI_ARGS}} --root .

  runtime-e2e:
    desc: End-to-end gate — dispatch each runnable pilot skill and fail on any non-zero exit
    cmds:
      - python3 scripts/runtime_dispatcher.py run --skill lint-skills
      - python3 scripts/runtime_dispatcher.py run --skill check-refs

  report:
    desc: Generate health dashboard from observability data
    cmd: python3 scripts/report_generator.py --root . --output agents/reports/health-dashboard.md

  report-stdout:
    desc: Print health dashboard to stdout
    cmd: python3 scripts/report_generator.py --root .

  lifecycle-report:
    desc: Generate skill lifecycle report
    cmd: python3 scripts/skill_lifecycle.py

  lifecycle-health:
    desc: Show skill health scores
    cmd: python3 scripts/skill_lifecycle.py --health

  consistency:
    desc: Verify sync + generated tool outputs are clean
    cmds:
      - task: sync-check
      - task: sync-check-hashes
      - task: sync
      - task: generate-tools
      - git diff --quiet

  consistency-fix:
    desc: Regenerate all derived outputs from source-of-truth
    cmds:
      - task: sync
      - task: generate-tools

  check-refs:
    desc: Check for broken cross-references in .md files
    cmd: python3 scripts/check_references.py

  check-refs-json:
    desc: Check for broken cross-references (JSON output)
    cmd: python3 scripts/check_references.py --format json

  check-portability:
    desc: Check package portability (no project-specific references)
    cmd: python3 scripts/check_portability.py

  check-compression:
    desc: Check compression quality (headings, code blocks, frontmatter, word count)
    cmd: python3 scripts/check_compression.py

  quality-report:
    desc: Generate quality score report (per artifact type)
    cmd: python3 scripts/skill_linter.py --report

  first-run:
    desc: Show the recommended first-run experience for new users
    cmd: bash scripts/first-run.sh

  ci:
    desc: Run ALL CI checks locally (must pass before push)
    cmds:
      - task: consistency
      - task: check-compression
      - task: check-refs
      - task: check-portability
      - task: lint-skills
      - task: lint-marketplace
      - task: test
      - task: runtime-e2e
      - task: lint-readme