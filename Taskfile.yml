version: '3'

# Root Taskfile — orchestration only.
# Task groups live under taskfiles/ and are flattened into the root namespace
# so existing invocations (`task ci`, `task sync`, `task lint-skills`, …) keep
# working unchanged.

includes:
  content:
    taskfile: ./taskfiles/content.yml
    flatten: true
  ci-fast:
    taskfile: ./taskfiles/ci-fast.yml
    flatten: true
  engine:
    taskfile: ./taskfiles/engine.yml
    flatten: true
  release:
    taskfile: ./taskfiles/release.yml
    flatten: true

tasks:
  _ci-start:
    desc: "Internal — record CI start time for duration reporting (P2.4)"
    internal: true
    cmd: date +%s > /tmp/agent-config-ci-start.txt

  _ci-end:
    desc: "Internal — print CI duration line (P2.4)"
    internal: true
    cmds:
      - |
        if [ -f /tmp/agent-config-ci-start.txt ]; then
          start=$(cat /tmp/agent-config-ci-start.txt)
          end=$(date +%s)
          dur=$((end - start))
          mins=$((dur / 60))
          secs=$((dur % 60))
          printf "\n⏱  task ci duration: %dm %ds (%ds total)\n" "$mins" "$secs" "$dur"
          rm -f /tmp/agent-config-ci-start.txt
        fi

  ci:
    desc: Run ALL CI checks locally (must pass before push) — emits duration line (P2.4)
    cmds:
      - task: _ci-start
      - defer: { task: _ci-end }
      - task: consistency
      - task: counts-check
      - task: check-index
      - task: check-compression
      - task: check-refs
      - task: check-portability
      - task: check-examples-shape
      - task: lint-roadmap-complexity
      - task: check-public-links
      - task: check-public-catalog-links
      - task: check-command-count
      - task: lint-no-new-atomic-commands
      - task: check-cluster-patterns
      - task: lint-rule-interactions
      - task: lint-load-context
      - task: check-context-paths
      - task: check-no-roadmap-refs
      - task: lint-one-off-age
      - task: check-ownership-matrix
      - task: check-reply-consistency
      - task: check-iron-law-prominence
      - task: check-always-budget
      - task: check-phase-coupling
      - task: check-one-off-location
      - task: validate-schema
      - task: lint-skills
      - task: lint-rule-tiers
      - task: lint-hook-manifest
      - task: lint-showcase-sessions
      - task: lint-marketplace
      - task: ci-cloud-bundle
      - task: ci-linear-digest
      - task: check-memory
      - task: golden-replay
      - task: test
      - task: runtime-e2e
      - task: check-roadmap-trackable
      - task: roadmap-progress-check
      - task: lint-readme
