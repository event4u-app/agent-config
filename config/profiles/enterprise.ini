; Agent Config — Profile: enterprise
; Best for: large teams, governance/enablement focus
; Token overhead: moderate-high
;
; Like full, but with minimal_runtime_context=false for richer context.
; Maximum reporting and lifecycle visibility.
; runtime_auto_read_reports still false — even enterprise is cost-controlled.

profile=enterprise

runtime_enabled=true
observability_reports=true
feedback_collection=true
ci_summary_enabled=true
tool_audit_enabled=true
lifecycle_report_enabled=true
feedback_suggestions_enabled=true
runtime_auto_read_reports=false
max_report_lines=100
minimal_runtime_context=false
