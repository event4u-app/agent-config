; Agent Config — Profile: balanced
; Best for: teams that want to run skills programmatically via the
; runtime dispatcher
; Token overhead: low
;
; Adds the runtime dispatcher on top of minimal, so skills that declare
; a shell command can be invoked via scripts/runtime_dispatcher.py.
; See docs/customization.md for the full profile description.

cost_profile=balanced

; Chat history (crash recovery) — balanced = phase-level traceability
chat_history_frequency=per_phase
chat_history_max_size_kb=256
chat_history_on_overflow=rotate
