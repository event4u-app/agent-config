; Agent Config — Profile: balanced
; Best for: most teams, good quality with controlled overhead
; Token overhead: low
;
; Runtime and limited observability enabled. Feedback is collected
; but not auto-injected into agent context.

profile=balanced

runtime_enabled=true
observability_reports=true
feedback_collection=true
ci_summary_enabled=true
tool_audit_enabled=false
lifecycle_report_enabled=false
feedback_suggestions_enabled=true
runtime_auto_read_reports=false
max_report_lines=40
minimal_runtime_context=true
