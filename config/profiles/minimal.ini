; Agent Config — Profile: minimal
; Best for: new users, solo developers, first-time adoption
; Token overhead: zero extra surface
;
; Default profile. Ships rules, skills, and commands only — no runtime
; dispatcher, no tool adapters. See docs/customization.md for the full
; profile description. scripts/install.py merges this file with
; config/agent-settings.template.ini to produce the user's .agent-settings.

cost_profile=minimal

; Chat history (crash recovery) — minimal = lightest footprint
chat_history_frequency=per_turn
chat_history_max_size_kb=128
chat_history_on_overflow=rotate
