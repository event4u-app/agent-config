# Agent Settings
# This file is generated by scripts/install.py from
# config/agent-settings.template.yml. It holds personal and project-wide
# preferences. Run /onboard for first-run setup; for later edits, change
# values here directly or ask the agent (it follows the merge rules in
# .augment/guidelines/agent-infra/layered-settings.md).

# --- Cost profile ---
#
# Selects which agent surfaces are active. See docs/customization.md for
# the authoritative description.
#
# minimal  = rules, skills, and commands only (zero extra surface, default)
# balanced = + runtime dispatcher for skills that declare a shell command
# full     = + tool adapters (GitHub / Jira, read-only, opt-in)
# custom   = ignore profile — every matrix value must be set explicitly
cost_profile: __COST_PROFILE__

# --- Personal preferences ---
personal:
  # IDE to use for opening files (code, phpstorm, cursor, …)
  # Empty = agent will not auto-open files; fill in once if you want that.
  ide: ""

  # Automatically open edited files in the IDE (true, false)
  open_edited_files: false

  # User's first name — used to address the user personally
  user_name: ""

  # rtk (Rust Token Killer) installed for output filtering (true, false)
  # Agent will auto-detect and ask once, then store the result
  rtk_installed: false

  # Minimal output mode (true, false)
  # true  = short bullet points during work, concise summary at the end
  # false = verbose explanations and reasoning
  minimal_output: true

  # Play-by-play mode (true, false)
  # true  = briefly share intermediate findings as you go
  # false = silently investigate, only report the conclusion
  play_by_play: false

  # Prefix PR comment replies with a bot icon 🤖 (true, false)
  # Personal preference — each developer decides for themselves.
  pr_comment_bot_icon: false

  # Autonomous execution — suppress trivial workflow questions (on, off, auto)
  # on   = act on the obvious next step; never ask "Step 2 or 3?", "should I commit?", etc.
  # off  = ask trivial workflow questions (legacy behavior)
  # auto = behaves like 'off' until the user says "arbeite selbstständig" / "work autonomously"
  #        in the conversation, then switches to 'on' for the rest of the chat.
  # Blocking decisions (security, scope expansion, push/merge/branch/PR) are NEVER suppressed.
  # See rules/autonomous-execution.md for the full definition.
  autonomy: auto

# --- Project / team preferences ---
project:
  # Path to the PR template file (relative to project root)
  pr_template: .github/pull_request_template.md

  # Target repository for universal improvement PRs (e.g. org/agent-config)
  upstream_repo: ""

  # Branch prefix for improvement PRs
  improvement_pr_branch_prefix: "improve/agent-"

# --- GitHub integration ---
github:
  # API method for replying to PR review comments
  # replies_endpoint      = POST /pulls/comments/{id}/replies (preferred)
  # create_review_comment = POST /pulls/{number}/reviews (fallback)
  # auto                  = detect on first use and update this setting
  pr_reply_method: create_review_comment

# --- Eloquent (Laravel) ---
eloquent:
  # Model property access style
  # getters_setters  = strict typed getters/setters, getAttribute() only inside model
  # get_attribute    = use getAttribute()/setAttribute() everywhere
  # magic_properties = use $model->column_name (Laravel default)
  access_style: getters_setters

# --- Chat history (crash recovery) ---
#
# Persistent JSONL log at .agent-chat-history (project root, git-ignored).
# Keeps a durable record of the conversation so a crashed or switched
# agent session can be resumed. See scripts/chat_history.py for the API.
chat_history:
  # Log chat events to disk (true, false)
  enabled: true

  # Logging granularity
  #   per_turn  = one entry per user↔agent turn (lightest)
  #   per_phase = one entry per workflow phase
  #   per_tool  = one entry per tool call (most verbose)
  frequency: __CHAT_HISTORY_FREQUENCY__

  # Max file size in KB before overflow handling kicks in (integer)
  max_size_kb: __CHAT_HISTORY_MAX_SIZE_KB__

  # Overflow behavior
  #   rotate   = drop oldest entries to stay under max_size_kb
  #   compress = mark for summarization on the next agent turn
  on_overflow: __CHAT_HISTORY_ON_OVERFLOW__

# --- Optional pipelines ---
pipelines:
  # Skill improvement pipeline (true, false)
  # true  = after meaningful tasks, propose learning capture and improvements (default)
  # false = silent, no post-task analysis
  # Included by every cost_profile except `custom`. Flip to false here if you
  # want a silent agent; `custom` profile ignores this default entirely.
  skill_improvement: true

# --- Roadmap execution ---
#
# Controls when /roadmap execute runs the project's quality pipeline
# (the `task ci` / `make test` / `npm run check` style command).
# Steps are ALWAYS marked `[x]` and the dashboard is ALWAYS regenerated
# in the same response — that cadence is governed by `roadmap-progress-sync`
# and is non-negotiable. This setting only governs *quality tool runs*.
roadmap:
  # When to run quality tools during /roadmap execute.
  #   end_of_roadmap = once, before archiving the completed roadmap (default — fastest, fewest tokens)
  #   per_phase      = once after every completed phase
  #   per_step       = after every completed step (legacy verbose; highest token cost)
  # Trade-off: end_of_roadmap saves tokens and time but lets errors compound
  # across phases. Pick per_phase if the work is risky or unfamiliar.
  # Iron Law `verify-before-complete` still applies — fresh quality output
  # is mandatory before any "roadmap complete" claim regardless of cadence.
  quality_cadence: end_of_roadmap

# --- Subagent orchestration ---
#
# Controls model selection and parallelism for subagent-based workflows
# (/do-and-judge, /do-in-steps, /judge). Empty values fall back to the
# runtime defaults described in .augment/contexts/subagent-configuration.md.
subagents:
  # Model for implementer subagents (empty = same tier as the session model)
  implementer_model: ""

  # Model for judge subagents
  # (empty = one tier above implementer: opus if sonnet, sonnet if haiku)
  judge_model: ""

  # Maximum number of parallel subagent invocations
  # Integer, default 3. Set to 1 to serialize. Hard cap enforced by runtime.
  max_parallel: 3

# --- AI Council (external second-opinion network) ---
#
# When enabled, the /council command lets the agent poll independent
# external models (OpenAI, Anthropic) for a neutral critique of a
# roadmap, diff, prompt, or file set. Council members never see the
# host agent's reasoning — only the artefact + a neutral system prompt.
#
# Tokens are NEVER stored here. They live in ~/.config/agent-config/
# <provider>.key (mode 0600), installed via:
#   bash scripts/install_anthropic_key.sh
#   bash scripts/install_openai_key.sh
#
# Cost note: every consultation makes real, paid API calls. The
# autonomy directive does NOT silently spend tokens — the /council
# command always asks before invoking, even under autonomy: on.
ai_council:
  # Master switch (true, false). Default false — installing a key is
  # not the same as wanting the agent to spend money on it.
  enabled: false

  # Default transport mode for every member (overridable per-member
  # below, and per-invocation via `/council mode:<x>`).
  #
  #   api        = direct SDK call against the provider's API (billable).
  #   manual     = copy-paste loop, user is the transport (free).
  #   playwright = browser automation (Phase 2c, not yet wired).
  #
  # Precedence: invocation flag > per-member mode > global mode > "api".
  mode: "api"

  # Per-member configuration. Set enabled=true on the providers you want
  # to consult. The model field selects which model receives the query.
  # Optional `mode:` overrides the global setting for that member only.
  members:
    anthropic:
      enabled: false
      model: "claude-sonnet-4-5"
      # mode: "api"      # uncomment to override ai_council.mode
    openai:
      enabled: false
      model: "gpt-4o"
      # mode: "manual"   # uncomment to override ai_council.mode

  # Hard cost ceiling per /council invocation. The orchestrator pauses
  # before any member whose projected spend would breach a cap and asks
  # the user to continue. `max_total_usd: 0` disables the USD ceiling
  # (token caps still apply).
  #
  # Prices come from `.agent-prices.md` (gitignored, refreshed weekly
  # by `python3 scripts/update_prices.py`; bootstrapped from
  # scripts/ai_council/_default_prices.py on first run).
  cost_budget:
    max_input_tokens: 50000
    max_output_tokens: 20000
    max_calls: 10
    max_total_usd: 0.50

  # Retention for `agents/council-sessions/` audit folders. Sessions
  # older than this are pruned automatically on the next `save()`.
  # `0` disables pruning (keep forever — disk grows unbounded).
  session_retention_days: 14

# --- Onboarding ---
#
# Tracks whether the initial setup flow (/onboard) has been completed
# for this developer on this project. When false, the onboarding-gate
# rule prompts the user to run /onboard before starting normal work.
# Missing entirely = legacy project (treated as onboarded).
onboarding:
  # Has the developer completed /onboard? (true, false)
  # Set to true automatically by /onboard at the end. Flip to false if
  # you want to re-run the flow.
  onboarded: false

# --- Command suggestion (numbered-options shortcut finder) ---
#
# When the user's free-form prompt matches an eligible slash command,
# the agent surfaces a numbered-options block with the recommendation
# plus an always-present "run as-is" option. The suggestion layer
# never auto-executes — the user picks. See rules/command-suggestion-policy.md.
commands:
  suggestion:
    # Master switch (true, false). false = the layer is silent; explicit
    # /commands still work as today.
    enabled: true

    # Minimum match score (0.0–1.0) before a suggestion surfaces.
    # 0.6 = default; raise to 0.7 for stricter behaviour, lower to 0.5
    # if too many useful suggestions are being suppressed.
    confidence_floor: 0.6

    # Cooldown in seconds between re-suggestions of the same
    # (command, evidence) pair. Default 600s = 10m.
    cooldown_seconds: 600

    # Max number of command suggestions before the as-is option.
    # The as-is option is always extra (so total = max_options + 1).
    max_options: 4

    # Commands to never suggest. Still work when typed explicitly.
    # Example: ["/refine-ticket", "/work"]
    blocklist: []
