# Used by the Phase 0 spike to verify end-to-end flow of the dispatcher.
id: DEV-1001
title: Add retry header to outbound webhooks
body: |
  The outbound webhook dispatcher does not emit a retry counter.
  Downstream consumers need an `X-Webhook-Retry` header with the
  current attempt number (1-based) so they can deduplicate.
acceptance_criteria:
  - Header `X-Webhook-Retry: N` is present on every dispatch.
  - N starts at 1 on the first attempt and increments on each retry.
  - Unit test covers retry counter 1, 2, 3.
  - No change to the payload body.
source: jira
persona_hint: senior-engineer

